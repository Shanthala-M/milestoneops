version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: milestoneops
      POSTGRES_PASSWORD: milestoneops
      POSTGRES_DB: milestoneops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://milestoneops:milestoneops@db:5432/milestoneops
      SECRET_KEY: dev-secret-key-change-in-prod
      FLASK_DEBUG: "1"
      FLASK_APP: run.py
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata: