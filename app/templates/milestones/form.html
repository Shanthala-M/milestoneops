{% extends "base.html" %}
{% block title %}{{ action }} Milestone · MilestoneOps{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <p style="font-size:12px; color:#888; margin-bottom:4px;">
      <a href="{{ url_for('projects.list_projects') }}"
         style="color:#888; text-decoration:none;">Projects</a>
      /
      <a href="{{ url_for('projects.view_project', project_id=project.id) }}"
         style="color:#888; text-decoration:none;">{{ project.name }}</a>
      / {{ action }} Milestone
    </p>
    <h1>{{ action }} Milestone</h1>
  </div>
  <a href="{{ url_for('projects.view_project', project_id=project.id) }}"
     class="btn btn-secondary">Back</a>
</div>

<div class="form-wrap">
  <form method="POST">

    <div class="form-group">
      <label>Title *</label>
      <input type="text"
             name="title"
             class="form-control"
             value="{{ form_data.title if form_data.title else '' }}"
             placeholder="e.g. Beta Release - Auth Module"
             maxlength="200"
             required />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description"
                class="form-control"
                placeholder="Goals, scope, acceptance criteria...">{{ form_data.description if form_data.description else '' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Due Date *</label>
        <input type="date"
               name="due_date"
               class="form-control"
               value="{{ form_data.due_date if form_data.due_date else '' }}"
               required />
      </div>

      <div class="form-group">
        <label>Priority *</label>
        <select name="priority" class="form-control">
          {% for p in ['Low', 'Medium', 'High', 'Critical'] %}
            <option value="{{ p }}"
              {% if form_data.priority == p %}selected{% endif %}>
              {{ p }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Status *</label>
      <select name="status" class="form-control">
        {% for s in ['Planned', 'In Progress', 'Completed', 'Blocked', 'Cancelled'] %}
          <option value="{{ s }}"
            {% if form_data.status == s %}selected{% endif %}>
            {{ s }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {% if action == 'Create' %}Create Milestone{% else %}Save Changes{% endif %}
      </button>
      <a href="{{ url_for('projects.view_project', project_id=project.id) }}"
         class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
