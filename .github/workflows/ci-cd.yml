name: MilestoneOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  lint:
    name: Static Code Analysis - Flake8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: flake8 app/ config.py run.py --max-line-length=100 --extend-ignore=W292,W293,W291,E302,E303,F401 --statistics --count

  security-scan:
    name: Security Vulnerability Scan - Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r app/ config.py run.py -ll -f json -o bandit-report.json || true

      - name: Show Bandit summary in logs
        run: bandit -r app/ config.py run.py -ll -f txt || true

      - name: Save Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  test:
    name: Automated Tests - pytest
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key
          FLASK_DEBUG: "0"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [lint, security-scan, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH and deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/milestoneops
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            export DATABASE_URL=postgresql://milestoneops:devopssec2026@localhost/milestoneops
            export SECRET_KEY=milestoneops-production-secret-2026
            flask db upgrade
            sudo systemctl restart milestoneops